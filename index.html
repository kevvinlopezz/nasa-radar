<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigilancia Espacial Mendoza</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1212.0.min.js"></script>
    <style>
        :root { --cyan: #0ff; --pink: #f0f; }
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { padding: 40px; text-shadow: 0 0 10px var(--cyan); }
        .control-panel { background: rgba(255,0,255,0.1); border: 2px solid var(--pink); border-radius: 50px; display: inline-block; padding: 10px 30px; margin-bottom: 40px; }
        input[type="date"] { background: transparent; border: 1px solid var(--cyan); color: #fff; padding: 8px; border-radius: 5px; outline: none; }
        button { background: var(--cyan); border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-left: 10px; }
        button:hover { box-shadow: 0 0 20px var(--cyan); transform: scale(1.05); }
        .status { color: var(--pink); font-weight: bold; margin-bottom: 20px; height: 20px; text-transform: uppercase; }
        table { width: 90%; margin: 0 auto; border-collapse: collapse; background: rgba(0,255,255,0.05); border-radius: 15px; overflow: hidden; }
        th { color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 15px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .danger { color: #ff4444; font-weight: bold; }
        .safe { color: #44ff44; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VIGILANCIA ESPACIAL MENDOZA</h1>
    </div>

    <div class="control-panel">
        <input type="date" id="fechaInput">
        <button onclick="procesar()">SINCRONIZAR FECHA</button>
    </div>

    <div id="statusLabel" class="status"></div>

    <table>
        <thead>
            <tr>
                <th>Objeto</th>
                <th>Tamaño (Estadios)</th>
                <th>Velocidad</th>
                <th>Distancia</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo">
            </tbody>
    </table>

    <script>
        // 1. CONFIGURACIÓN - PEGA TUS DATOS AQUÍ
        const AWS_ACCESS_KEY = 'TU_ACCESS_KEY';
        const AWS_SECRET_KEY = 'TU_SECRET_KEY';
        const API_URL = 'URL_DE_TU_API_GATEWAY'; // La que termina en .amazonaws.com/
        const S3_OUTPUT = 's3://kevin-nasa-data-lake-virginia/athena-results/';

        AWS.config.update({
            accessKeyId: AWS_ACCESS_KEY,
            secretAccessKey: AWS_SECRET_KEY,
            region: 'us-east-1'
        });

        const athena = new AWS.Athena();

        async function procesar() {
            const fecha = document.getElementById('fechaInput').value;
            const status = document.getElementById('statusLabel');
            const tabla = document.getElementById('tablaCuerpo');
            
            if (!fecha) return alert("Elegí una fecha, loco");

            try {
                status.innerText = "Sincronizando con la NASA...";
                
                // Llamada a la Lambda para asegurar que el JSON exista en S3
                await fetch(API_URL, {
                    method: 'POST',
                    body: json.stringify({ fecha: fecha })
                });

                status.innerText = "Consultando base de datos Athena...";
                
                const sql = `SELECT name, estimated_diameter_max_km, velocity_km_h, miss_distance_km, is_potentially_hazardous_asteroid 
                             FROM "nasa_db"."silver_asteroides" 
                             WHERE fecha_archivo = '${fecha}'`;

                const data = await ejecutarQuery(sql);
                renderizar(data);
                status.innerText = "Radar actualizado";

            } catch (err) {
                console.error(err);
                status.innerText = "Error en los sensores espaciales";
                alert("Error: " + err.message);
            }
        }

        async function ejecutarQuery(sql) {
            const params = {
                QueryString: sql,
                ResultConfiguration: { OutputLocation: S3_OUTPUT },
                WorkGroup: 'primary' // Esto arregla el error de ejecución
            };

            const start = await athena.startQueryExecution(params).promise();
            const executionId = start.QueryExecutionId;

            let state = "RUNNING";
            while (state === "RUNNING" || state === "QUEUED") {
                const check = await athena.getQueryExecution({QueryExecutionId: executionId}).promise();
                state = check.QueryExecution.Status.State;
                if (state === "FAILED") throw new Error("Athena falló: " + check.QueryExecution.Status.StateChangeReason);
                await new Promise(r => setTimeout(r, 1000));
            }

            return await athena.getQueryResults({QueryExecutionId: executionId}).promise();
        }

        function renderizar(data) {
            const filas = data.ResultSet.Rows.slice(1);
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = "";

            filas.forEach(row => {
                const [name, diam, vel, dist, haz] = row.Data.map(d => d.VarCharValue);
                const esPeligroso = haz === "true";
                
                // Conversión a estadios (aprox 0.2km)
                const estadios = (parseFloat(diam) / 0.2).toFixed(2);

                tabla.innerHTML += `
                    <tr>
                        <td>${name}</td>
                        <td>${estadios} 🏟️</td>
                        <td>${Math.round(vel)} km/h</td>
                        <td>${(parseFloat(dist)/1000000).toFixed(2)} M km</td>
                        <td class="${esPeligroso ? 'danger' : 'safe'}">${esPeligroso ? 'PELIGRO' : 'SEGURO'}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
